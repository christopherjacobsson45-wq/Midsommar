<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Midsommar i Slimminge</title>

<style>
body{margin:0;font-family:Arial;background:black;color:white;text-align:center;}

.teamsTop{
display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin-top:10px;
}

.teamsTop img{
width:60px;height:60px;border-radius:50%;border:2px solid white;
}

.menuGrid{
display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:20px;
}

button{
padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:16px;
}

.locked button{
background:#444;opacity:0.6;
}

.scoreboard{
display:flex;justify-content:center;gap:20px;margin-top:20px;
}

.team{
background:#111;padding:15px;border-radius:10px;
}

#backBtn{
position:fixed;top:10px;left:10px;padding:10px;background:#111;color:white;border-radius:10px;
}

/* VIDEO FULLSCREEN */
#videoContainer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

#videoContainer video{
width:100%;
height:100%;
object-fit:cover;
}

/* POPUP */
#lockOverlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
color:white;
justify-content:center;
align-items:center;
text-align:center;
z-index:9999;
flex-direction:column;
}
</style>
</head>

<body>

<button id="backBtn" onclick="location.reload()">🏠</button>

<h1>Midsommar i Slimminge</h1>

<!-- 🎬 VIDEO KNAPP -->
<button onclick="playVideo()">🎬 Välkomstvideo</button>

<div class="teamsTop">
<div><h3>Lag 1</h3><img src="bilder/21.png"><img src="bilder/22.png"><img src="bilder/23.png"></div>
<div><h3>Lag 2</h3><img src="bilder/31.png"><img src="bilder/32.png"><img src="bilder/33.png"></div>
<div><h3>Lag 3</h3><img src="bilder/41.png"><img src="bilder/42.png"><img src="bilder/43.png"></div>
</div>

<h2>Nu smäller det</h2>

<!-- 🔴 START -->
<button id="startBtn" onclick="startGame()">▶️ Starta spel</button>

<div class="menuGrid">

<a href="lek1.html" data-lek="lek1"><button>M&M</button></a>
<a href="lek2.html" data-lek="lek2"><button>Skrik och panik</button></a>
<a href="lek3.html" data-lek="lek3"><button>Triathlon</button></a>
<a href="lek4.html" data-lek="lek4"><button>3dje sinnet</button></a>
<a href="lek5.html" data-lek="lek5"><button>Labyrinten</button></a>
<a href="jepoardy.html" data-lek="lek6"><button>El grande finale</button></a>

</div>

<h2>Total poäng</h2>

<div class="scoreboard">
<div class="team">Lag 1: <span id="lag1">0</span></div>
<div class="team">Lag 2: <span id="lag2">0</span></div>
<div class="team">Lag 3: <span id="lag3">0</span></div>
</div>

<!-- VIDEO -->
<div id="videoContainer">
<video id="video" src="video.mp4"></video>
</div>

<!-- POPUP -->
<div id="lockOverlay">
<h2>🔒 Denna lek är låst</h2>
<p>Den öppnas när lekledaren godkänt det</p>
<button onclick="closeOverlay()">Stäng</button>
</div>

<script>

/* 🔴 START SPEL */
function startGame(){
localStorage.setItem("unlocked", JSON.stringify(["lek1"]));
applyLocks();
startBtn.style.display="none";
}

/* 🔒 LOCK SYSTEM */
function applyLocks(){

let unlocked = JSON.parse(localStorage.getItem("unlocked")) || [];

document.querySelectorAll(".menuGrid a").forEach(link=>{

let lek = link.dataset.lek;

/* reset */
link.classList.remove("locked");
link.onclick = null;

/* lås */
if(!unlocked.includes(lek)){
link.classList.add("locked");

link.onclick = function(e){
e.preventDefault();
lockOverlay.style.display="flex";
};
}

});
}

/* 🎬 VIDEO */
function playVideo(){

videoContainer.style.display="block";
video.requestFullscreen();
video.play();

video.onended = ()=>{
videoContainer.style.display="none";
document.exitFullscreen();
};

}

/* POPUP */
function closeOverlay(){
lockOverlay.style.display="none";
}

/* POÄNG */
function calculateTotal(){
let data = JSON.parse(localStorage.getItem("games")) || {};
let total = [0,0,0];

Object.values(data).forEach(g=>{
total[0]+=g[0];
total[1]+=g[1];
total[2]+=g[2];
});

lag1.innerText = total[0];
lag2.innerText = total[1];
lag3.innerText = total[2];
}

/* 🔴 VIKTIGT: ALLT LÅST VID START */
if(!localStorage.getItem("unlocked")){
localStorage.setItem("unlocked", JSON.stringify([]));
}

/* INIT */
calculateTotal();
applyLocks();

</script>

</body>
</html>
