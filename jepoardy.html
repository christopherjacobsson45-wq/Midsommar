<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Jeopardy Finale</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

#scoreboard{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-around;
padding:15px;
background:rgba(0,0,0,0.6);
z-index:999;
}

.team span{
display:block;
font-size:24px;
color:#ffd700;
}

#board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
padding:120px 20px;
}

.header{
background:linear-gradient(135deg,#0072ff,#00c6ff);
padding:15px;
border-radius:12px;
}

.cell{
background:rgba(255,255,255,0.08);
border-radius:12px;
padding:30px;
font-size:22px;
cursor:pointer;
}

#questionView{
position:fixed;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

#qText{font-size:42px;margin:20px;}
#timer{font-size:60px;color:#ffd700;}

button{
border:none;
border-radius:10px;
padding:12px 20px;
margin:6px;
cursor:pointer;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
color:white;
}

.correct{background:linear-gradient(135deg,#00c853,#43e97b);}
.wrong{background:linear-gradient(135deg,#d50000,#ff6a6a);}
#teams button{background:#2a5298;}
</style>
</head>

<body>

<div id="scoreboard"></div>
<div id="board"></div>

<div id="questionView">
<div id="qText"></div>
<div id="timer"></div>
<div id="teams"></div>

<input id="betInput" type="number" style="display:none;">
<button id="confirmBet" style="display:none;">Bekräfta</button>

<button onclick="toggleAudio()">Play / Pause</button>
<button onclick="showAnswer()">Visa svar</button>
<button class="correct" onclick="correct()">RÄTT</button>
<button class="wrong" onclick="wrong()">FEL</button>
<button onclick="closeQ()">Stäng</button>
</div>

<audio id="song1" src="1.mp3"></audio>
<audio id="song2" src="2.mp3"></audio>
<audio id="song3" src="3.mp3"></audio>
<audio id="song4" src="4.mp3"></audio>
<audio id="song5" src="5.mp3"></audio>

<script>

let currentAudio=null;
let currentCell=null;
let currentKey,activeTeam,bet=0,time,int;

/* NYTT – håller poängen */
let questionPoints = 0;

/* POÄNG */
let data=JSON.parse(localStorage.getItem("games"))||{};
let saved=[0,0,0];

Object.values(data).forEach(g=>{
saved[0]+=g[0];
saved[1]+=g[1];
saved[2]+=g[2];
});

let teams=[
{name:"Lag 1",points:saved[0]},
{name:"Lag 2",points:saved[1]},
{name:"Lag 3",points:saved[2]}
];

function renderScoreboard(){
let s=document.getElementById("scoreboard");
s.innerHTML="";
teams.forEach(t=>{
let d=document.createElement("div");
d.className="team";
d.innerHTML=`${t.name}<span>${t.points} p</span>`;
s.appendChild(d);
});
}

function updateStorage(){
localStorage.setItem("totalScores", JSON.stringify(teams.map(t=>t.points)));
}

/* LAGVAL */
function renderTeams(bonus=false){
let tDiv=document.getElementById("teams");
tDiv.innerHTML="";

teams.forEach(t=>{
let b=document.createElement("button");
b.innerText=bonus?`${t.name} (${t.points}p)`:t.name;

b.onclick=()=>{
activeTeam=t;
if(bonus) document.getElementById("betInput").value=t.points;
};

tDiv.appendChild(b);
});
}

/* BONUS */
function setupBet(){
renderTeams(true);
betInput.style.display="block";
confirmBet.style.display="block";
}

confirmBet.onclick=function(){
bet=parseInt(betInput.value)||0;
if(!activeTeam||!bet) return;

let data=questions[currentKey];
qText.innerHTML=data.q;

betInput.style.display="none";
confirmBet.style.display="none";

startTimer(10);
};

/* DATA */
let categories=["Svengelska","5e klass","Idiotfrågan","Mansgris","8 mars"];

const questions = { /* DIN ORIGINAL LISTA HÄR */ };

/* BUILD */
function build(){
let b=document.getElementById("board");

categories.forEach(c=>{
let d=document.createElement("div");
d.className="header";
d.innerText=c;
b.appendChild(d);
});

for(let r=1;r<=5;r++){
categories.forEach((c,i)=>{
let key=i+"-"+r;
let d=document.createElement("div");
d.className="cell";
d.innerText=r;
d.onclick=()=>openQ(key,d,r); /* SKICKAR MED POÄNG */
b.appendChild(d);
});
}
}

/* OPEN */
function openQ(key,cell,value){

if(cell.classList.contains("used")) return;

currentCell=cell;
currentKey=key;

/* SÄTT POÄNG */
questionPoints = value;

let data=questions[key];

questionView.style.display="flex";

/* TA BORT FRÅGA DIREKT */
cell.classList.add("used");
cell.innerText="";
cell.style.background="#000";

/* AUDIO */
if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}

if(key.startsWith("0-") && data.audio){
let audio=document.getElementById(data.audio);
currentAudio=audio;
audio.play();
timer.innerHTML="";
}else{
startTimer(5);
}

/* BONUS */
if(data.bonus){
qText.innerHTML="Bonusfråga – satsa poäng!";
setupBet();
return;
}

qText.innerHTML=data.q;
renderTeams();
}

/* AUDIO */
function toggleAudio(){
if(!currentAudio) return;
currentAudio.paused?currentAudio.play():currentAudio.pause();
}

/* TIMER */
function startTimer(t){
clearInterval(int);
time=t;
timer.innerText=t;

int=setInterval(()=>{
time--;
timer.innerText=time;
if(time<=0) clearInterval(int);
},1000);
}

/* SVAR */
function showAnswer(){
qText.innerHTML+="<br><b>"+questions[currentKey].a+"</b>";
}

/* RESULT */
function correct(){
if(!activeTeam) return;

questions[currentKey].bonus
? activeTeam.points+=bet
: activeTeam.points+=questionPoints;

updateStorage();
renderScoreboard();
closeQ();
}

function wrong(){
if(!activeTeam) return;

questions[currentKey].bonus
? activeTeam.points-=bet
: activeTeam.points-=questionPoints;

updateStorage();
renderScoreboard();
closeQ();
}

/* CLOSE */
function closeQ(){
questionView.style.display="none";

if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}

activeTeam=null;
bet=0;
document.getElementById("teams").innerHTML="";
betInput.style.display="none";
confirmBet.style.display="none";
}

/* INIT */
renderScoreboard();
build();

</script>

</body>
</html>
