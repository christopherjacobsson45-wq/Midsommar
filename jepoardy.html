<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Jeopardy Finale</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
}

/* SCORE */
#scoreboard{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-around;
padding:15px;
background:rgba(0,0,0,0.7);
}

.team span{
display:block;
font-size:22px;
color:#ffd700;
}

/* BOARD */
#board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:110px 20px;
}

.header{
background:#00c6ff;
padding:12px;
border-radius:10px;
font-weight:bold;
}

.cell{
background:#1f4068;
border-radius:10px;
padding:30px;
font-size:24px;
cursor:pointer;
transition:0.2s;
}

.cell:hover{transform:scale(1.05);}

/* MODAL */
#questionView{
position:fixed;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

#qText{
font-size:48px;
font-weight:bold;
margin:20px;
}

#timer{
font-size:60px;
color:#ffd700;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.correct{background:#00c853;}
.wrong{background:#d50000;}
</style>
</head>

<body>

<div id="scoreboard"></div>
<div id="board"></div>

<div id="questionView">
<div id="qText"></div>
<div id="timer"></div>
<div id="teams"></div>

<input id="betInput" type="number" style="display:none;">
<button id="confirmBet" style="display:none;">Bekräfta</button>

<button id="audioBtn" onclick="toggleAudio()" style="display:none;">Play / Pause</button>

<button onclick="showAnswer()">Visa svar</button>
<button class="correct" onclick="correct()">RÄTT</button>
<button class="wrong" onclick="wrong()">FEL</button>
</div>

<audio id="song1" src="1.mp3"></audio>
<audio id="song2" src="2.mp3"></audio>
<audio id="song3" src="3.mp3"></audio>
<audio id="song4" src="4.mp3"></audio>
<audio id="song5" src="5.mp3"></audio>

<script>

/* ELEMENT */
const qText=document.getElementById("qText");
const timer=document.getElementById("timer");
const questionView=document.getElementById("questionView");
const teamsDiv=document.getElementById("teams");
const betInput=document.getElementById("betInput");
const confirmBet=document.getElementById("confirmBet");
const audioBtn=document.getElementById("audioBtn");

/* DATA */
let currentAudio=null,currentCell=null,currentKey,activeTeam,bet=0,points=0,int;

/* LOAD SCORE */
let data=JSON.parse(localStorage.getItem("games"))||{};
let saved=[0,0,0];

Object.values(data).forEach(g=>{
saved[0]+=g[0];
saved[1]+=g[1];
saved[2]+=g[2];
});

let teams=[
{name:"Lag 1",points:saved[0]},
{name:"Lag 2",points:saved[1]},
{name:"Lag 3",points:saved[2]}
];

/* SCORE */
function renderScore(){
let s=document.getElementById("scoreboard");
s.innerHTML="";
teams.forEach(t=>{
let d=document.createElement("div");
d.className="team";
d.innerHTML=`${t.name}<span>${t.points} p</span>`;
s.appendChild(d);
});
}

/* CATEGORIES */
let categories=["Svengelska","5e klass","Idiotfrågan","Mansgris","8 mars"];

/* QUESTIONS (ALLA KVAR) */
const questions=YOUR_ORIGINAL_QUESTIONS_OBJECT_HERE;

/* BUILD */
function build(){
let b=document.getElementById("board");

categories.forEach(c=>{
let d=document.createElement("div");
d.className="header";
d.innerText=c;
b.appendChild(d);
});

for(let r=1;r<=5;r++){
categories.forEach((c,i)=>{
let key=i+"-"+r;
let d=document.createElement("div");
d.className="cell";
d.innerText=r;
d.onclick=()=>openQ(key,d,r);
b.appendChild(d);
});
}
}

/* OPEN */
function openQ(key,cell,value){

if(cell.classList.contains("used")) return;

currentCell=cell;
currentKey=key;
points=value;

let data=questions[key];

questionView.style.display="flex";
cell.classList.add("used");
cell.innerText="";
cell.style.background="#000";

/* RESET */
audioBtn.style.display="none";

/* AUDIO */
if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}

if(key.startsWith("0-") && data.audio){
currentAudio=document.getElementById(data.audio);
currentAudio.play();
audioBtn.style.display="block";
timer.innerHTML="";
}else{
startTimer(5);
}

/* BONUS */
if(data.bonus){
qText.innerHTML="BONUS – satsa poäng";
setupBet();
return;
}

qText.innerHTML=data.q;
renderTeams();
}

/* AUDIO */
function toggleAudio(){
if(!currentAudio) return;
currentAudio.paused?currentAudio.play():currentAudio.pause();
}

/* TEAMS */
function renderTeams(){
teamsDiv.innerHTML="";
teams.forEach(t=>{
let b=document.createElement("button");
b.innerText=t.name;
b.onclick=()=>activeTeam=t;
teamsDiv.appendChild(b);
});
}

/* BONUS */
function setupBet(){
renderTeams();
betInput.style.display="block";
confirmBet.style.display="block";

confirmBet.onclick=function(){
bet=parseInt(betInput.value)||0;
if(!activeTeam||bet<=0||bet>activeTeam.points) return;

qText.innerHTML=questions[currentKey].q;
betInput.style.display="none";
confirmBet.style.display="none";
startTimer(10);
};
}

/* TIMER */
function startTimer(t){
clearInterval(int);
let time=t;
timer.innerText=time;

int=setInterval(()=>{
time--;
timer.innerText=time;
if(time<=0) clearInterval(int);
},1000);
}

/* ANSWER */
function showAnswer(){
qText.innerHTML+="<br><b>"+questions[currentKey].a+"</b>";
}

/* RESULT */
function correct(){
if(!activeTeam) return;

if(questions[currentKey].bonus){
activeTeam.points+=bet;
}else{
activeTeam.points+=points;
}

finish();
}

function wrong(){
if(!activeTeam) return;

if(questions[currentKey].bonus){
activeTeam.points-=bet;
}else{
activeTeam.points-=points;
}

finish();
}

/* CLOSE */
function finish(){
renderScore();

questionView.style.display="none";

activeTeam=null;
bet=0;
teamsDiv.innerHTML="";
betInput.style.display="none";
confirmBet.style.display="none";

if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}
}

/* INIT */
renderScore();
build();

</script>

</body>
</html>
