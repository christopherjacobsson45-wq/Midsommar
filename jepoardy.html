<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Jeopardy Finale</title>

<style>
body{
margin:0;
background:radial-gradient(circle at top,#0f2027,#203a43,#000);
color:#fff;
font-family:Arial;
text-align:center;
}

/* SCOREBOARD */
#scoreboard{
position:fixed;
top:0;
left:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:15px;
z-index:999;
border-bottom:2px solid #ffd700;
}

.team{
font-size:18px;
}

.team span{
display:block;
font-size:26px;
font-weight:bold;
color:#ffd700;
}

/* BOARD */
#board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
padding:120px 20px;
}

.cell{
background:#1c3550;
color:#ffd700;
padding:30px;
border-radius:14px;
cursor:pointer;
font-size:24px;
transition:0.2s;
}

.cell:hover{
transform:scale(1.05);
background:#254a6b;
}

.header{
background:#0072ff;
padding:20px;
border-radius:14px;
font-weight:bold;
}

/* MODAL */
#questionView{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

#qText{
font-size:32px;
max-width:900px;
margin:20px;
}

#timer{
font-size:70px;
color:#ffd700;
margin:20px;
}

button{
padding:14px 22px;
margin:8px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
color:white;
}

.correct{background:#00c853;}
.wrong{background:#d50000;}

#teams button{
background:#2a5298;
}
</style>
</head>

<body>

<div id="scoreboard"></div>
<div id="board"></div>

<div id="questionView">
<div id="qText"></div>
<div id="timer"></div>
<div id="teams"></div>

<input id="betInput" type="number" placeholder="Satsa poäng" style="display:none;">
<button id="confirmBet" style="display:none;">Bekräfta satsning</button>

<button onclick="toggleAudio()">Play / Pause</button>

<button onclick="showAnswer()">Visa svar</button>
<button class="correct" onclick="correct()">RÄTT</button>
<button class="wrong" onclick="wrong()">FEL</button>
<button onclick="closeQ()">Stäng</button>
</div>

<audio id="song1" src="1.mp3"></audio>
<audio id="song2" src="2.mp3"></audio>
<audio id="song3" src="3.mp3"></audio>
<audio id="song4" src="4.mp3"></audio>
<audio id="song5" src="5.mp3"></audio>

<script>

/* 🔊 AUDIO CONTROL */
let currentAudio = null;

/* HÄMTA TOTALPOÄNG */
let data = JSON.parse(localStorage.getItem("games")) || {};
let saved = [0,0,0];

Object.values(data).forEach(g=>{
saved[0]+=g[0];
saved[1]+=g[1];
saved[2]+=g[2];
});

let teams=[
{name:"Lag 1",points:saved[0]},
{name:"Lag 2",points:saved[1]},
{name:"Lag 3",points:saved[2]}
];

function renderScoreboard(){
let s=document.getElementById("scoreboard");
s.innerHTML="";
teams.forEach(t=>{
let d=document.createElement("div");
d.className="team";
d.innerHTML=t.name+"<span>"+t.points+" p</span>";
s.appendChild(d);
});
}

function updateStorage(){
let arr=teams.map(t=>t.points);
localStorage.setItem("totalScores", JSON.stringify(arr));
}

/* DATA */
let categories=["Svengelska","5e klass","Idiotfrågan","Mansgris","8 mars"];

const questions={
"0-1":{q:"Låt1",a:"SVARET",audio:"song1"},
"0-2":{q:"låt2",a:"SVARET",audio:"song2"},
"0-3":{q:"låt3",a:"SVARET",audio:"song3"},
"0-4":{bonus:true,q:"låt 4",a:"SVARET",audio:"song4"},
"0-5":{q:"låt5",a:"SVARET",audio:"song5"}
};

let currentKey,activeTeam,bet=0,time,int;

/* BUILD */
function build(){
let b=document.getElementById("board");

categories.forEach(c=>{
let d=document.createElement("div");
d.className="header";
d.innerText=c;
b.appendChild(d);
});

for(let r=1;r<=5;r++){
categories.forEach((c,i)=>{
let key=i+"-"+r;
let d=document.createElement("div");
d.className="cell";
d.innerText=r;
d.onclick=()=>openQ(key);
b.appendChild(d);
});
}
}

/* OPEN */
function openQ(key){
currentKey=key;
let data=questions[key];

document.getElementById("questionView").style.display="flex";

/* STOPPA GAMMALT LJUD */
if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}

if(data.audio){
currentAudio=document.getElementById(data.audio);
currentAudio.play();
}

if(data.bonus){
document.getElementById("qText").innerHTML="Bonusfråga – satsa poäng!";
setupBet();
return;
}

document.getElementById("qText").innerHTML=data.q;

if(key.startsWith("0-")){
document.getElementById("timer").innerHTML="";
}else{
startTimer(5);
}

renderTeams();
}

/* AUDIO TOGGLE */
function toggleAudio(){
if(!currentAudio) return;

if(currentAudio.paused){
currentAudio.play();
}else{
currentAudio.pause();
}
}

/* TIMER */
function startTimer(t){
clearInterval(int);
time=t;
document.getElementById("timer").innerText=t;

int=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) clearInterval(int);
},1000);
}

/* ANSWER */
function showAnswer(){
let data=questions[currentKey];
document.getElementById("qText").innerHTML+="<br><b>"+data.a+"</b>";
}

function correct(){
if(!activeTeam) return;

if(questions[currentKey].bonus){
activeTeam.points+=bet;
}else{
activeTeam.points+=1;
}

updateStorage();
renderScoreboard();
closeQ();
}

function wrong(){
if(!activeTeam) return;

if(questions[currentKey].bonus){
activeTeam.points-=bet;
}

updateStorage();
renderScoreboard();
}

/* CLOSE */
function closeQ(){
document.getElementById("questionView").style.display="none";

if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}
}

/* INIT */
renderScoreboard();
build();

</script>

</body>
</html>
