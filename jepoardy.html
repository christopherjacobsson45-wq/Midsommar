<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Jeopardy Finale</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

/* SCOREBOARD */
#scoreboard{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:999;
}

.team span{
display:block;
font-size:24px;
font-weight:600;
color:#ffd700;
}

/* BOARD */
#board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
padding:120px 20px;
}

.header{
background:linear-gradient(135deg,#0072ff,#00c6ff);
padding:15px;
border-radius:12px;
font-weight:600;
}

.cell{
background:rgba(255,255,255,0.08);
border-radius:12px;
padding:30px;
font-size:22px;
cursor:pointer;
transition:0.2s;
}

.cell:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.15);
}

/* MODAL */
#questionView{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

#qText{
font-size:28px;
max-width:800px;
margin:20px;
}

#timer{
font-size:60px;
color:#ffd700;
}

/* BUTTONS */
button{
border:none;
border-radius:10px;
padding:12px 20px;
margin:6px;
font-size:15px;
cursor:pointer;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.correct{background:linear-gradient(135deg,#00c853,#43e97b);}
.wrong{background:linear-gradient(135deg,#d50000,#ff6a6a);}

#teams button{
background:linear-gradient(135deg,#2a5298,#1e3c72);
}
</style>
</head>

<body>

<div id="scoreboard"></div>
<div id="board"></div>

<div id="questionView">
<div id="qText"></div>
<div id="timer"></div>
<div id="teams"></div>

<input id="betInput" type="number" placeholder="Satsa poäng" style="display:none;">
<button id="confirmBet" style="display:none;">Bekräfta</button>

<button onclick="toggleAudio()">Play / Pause</button>
<button onclick="showAnswer()">Visa svar</button>
<button class="correct" onclick="correct()">RÄTT</button>
<button class="wrong" onclick="wrong()">FEL</button>
<button onclick="closeQ()">Stäng</button>
</div>

<audio id="song1" src="1.mp3"></audio>
<audio id="song2" src="2.mp3"></audio>
<audio id="song3" src="3.mp3"></audio>
<audio id="song4" src="4.mp3"></audio>
<audio id="song5" src="5.mp3"></audio>

<script>

let currentAudio=null;
let currentCell=null;

/* POÄNG */
let data=JSON.parse(localStorage.getItem("games"))||{};
let saved=[0,0,0];

Object.values(data).forEach(g=>{
saved[0]+=g[0];
saved[1]+=g[1];
saved[2]+=g[2];
});

let teams=[
{name:"Lag 1",points:saved[0]},
{name:"Lag 2",points:saved[1]},
{name:"Lag 3",points:saved[2]}
];

function renderScoreboard(){
let s=document.getElementById("scoreboard");
s.innerHTML="";
teams.forEach(t=>{
let d=document.createElement("div");
d.innerHTML=`${t.name}<span>${t.points} p</span>`;
s.appendChild(d);
});
}

function updateStorage(){
localStorage.setItem("totalScores", JSON.stringify(teams.map(t=>t.points)));
}

/* DATA */
let categories=["Svengelska","5e klass","Idiotfrågan","Mansgris","8 mars"];

const questions={

"0-1":{q:"Låt1",a:"Gyllene Tider - Sommartider",audio:"song1"},
"0-2":{q:"låt2",a:"Richard Marx - Right here waiting for you",audio:"song2"},
"0-3":{q:"låt3",a:"Gyllene Tider - Kung av sand",audio:"song3"},
"0-4":{bonus:true,q:"låt 4",a:"Whitney Houston - Always love you",audio:"song4"},
"0-5":{q:"låt5",a:"Passenger - Let her go",audio:"song5"},

"1-1":{q:"1. 1+2+3+4+5=",a:"15"},
"1-2":{q:"2. Få, färre, ……",a:"Färst"},
"1-3":{q:"3. Vad heter huvudstaden i Australien",a:"Canberra"},
"1-4":{q:"4. Vad står den kemiska beteckningen Co2 för?",a:"Koldioxid"},
"1-5":{bonus:true,q:"Vem var Sveriges första folkvalda konung",a:"Gustav Vasa"},

"2-1":{q:"1. Föräldra-skap eller föräldrar-skap?",a:"föräldra-skap"},
"2-2":{q:"2. Börjar man tideräkna vid jesu dö eller jesu födelse?",a:"Jesus födelse"},
"2-3":{q:"3. Är det en mittenskåra på Iprentabletten?",a:"nej"},
"2-4":{q:"4. Vilket håll går gubben på tändsticksasken?",a:"vänster"},
"2-5":{q:"5. Hur många färger finns det i den klassiska påsen Ahlgrens bilar?",a:"3"},

"3-1":{q:"1. Vilken sport tävlade Michael Schumacher i?",a:"Formel 1"},
"3-2":{q:"2. Vilket är det korrekta namnet på bilden?",a:"Bild på en fogsvans"},
"3-3":{q:"3. Vilket namn var Pamela Andersons karaktär i Baywatch?",a:"HÄR LÄGGER DU IN SVARET"},
"3-4":{q:"4. Vad heter den kände svenska fotografen som bland annat tog bilder till Slitz, Cafe och Moore?",a:"Bingo Rimer"},
"3-5":{q:"5. Vilken del i bilen är det som omvandlar bränsle till rörelseenergi och driver bilen framåt?",a:"Förbränningsmotor"},

"4-1":{q:"1. Vad firar man detta datum?",a:"internationella kvinnodagen"},
"4-2":{q:"2. Hur ofta sker ägglossning hos en kvinna?",a:"cirka en gång per månad"},
"4-3":{q:"3. Vad heter ”verktyget” som curlar ögonfransarna?",a:"ögonfransböjare"},
"4-4":{q:"FRÅGAN",a:"SVARET"},
"4-5":{q:"FRÅGAN",a:"SVARET"}

};

let currentKey,activeTeam,bet=0,time,int;

/* BUILD */
function build(){
let b=document.getElementById("board");

categories.forEach(c=>{
let d=document.createElement("div");
d.className="header";
d.innerText=c;
b.appendChild(d);
});

for(let r=1;r<=5;r++){
categories.forEach((c,i)=>{
let key=i+"-"+r;
let d=document.createElement("div");
d.className="cell";
d.innerText=r;
d.onclick=()=>openQ(key,d);
b.appendChild(d);
});
}
}

/* OPEN */
function openQ(key,cell){

if(cell.classList.contains("used")) return;

currentCell=cell;
currentKey=key;
let data=questions[key];

document.getElementById("questionView").style.display="flex";

/* STOP AUDIO */
if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}

/* PLAY AUDIO */
if(key.startsWith("0-") && data.audio){
let audio=document.getElementById(data.audio);
if(audio){
currentAudio=audio;
currentAudio.play();
}
document.getElementById("timer").innerHTML="";
}else{
startTimer(5);
}

if(data.bonus){
document.getElementById("qText").innerHTML="Bonusfråga – satsa poäng!";
setupBet();
return;
}

document.getElementById("qText").innerHTML=data.q;
renderTeams();
}

/* AUDIO */
function toggleAudio(){
if(!currentAudio) return;
currentAudio.paused?currentAudio.play():currentAudio.pause();
}

/* TIMER */
function startTimer(t){
clearInterval(int);
time=t;
document.getElementById("timer").innerText=t;

int=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) clearInterval(int);
},1000);
}

/* ANSWER */
function showAnswer(){
let data=questions[currentKey];
document.getElementById("qText").innerHTML+="<br><b>"+data.a+"</b>";
}

function correct(){
if(!activeTeam) return;

questions[currentKey].bonus ? activeTeam.points+=bet : activeTeam.points+=1;

updateStorage();
renderScoreboard();
closeQ();
}

function wrong(){
if(!activeTeam) return;

if(questions[currentKey].bonus) activeTeam.points-=bet;

updateStorage();
renderScoreboard();
}

/* CLOSE */
function closeQ(){
document.getElementById("questionView").style.display="none";

if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}

if(currentCell){
currentCell.classList.add("used");
currentCell.innerText="";
currentCell.style.background="#000";
currentCell.style.cursor="default";
}
}

/* INIT */
renderScoreboard();
build();

</script>

</body>
</html>
